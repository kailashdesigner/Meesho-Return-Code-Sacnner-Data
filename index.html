<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Return Tracking Scanner</title>
    <link rel="stylesheet" href="style.css">
    <!-- html5-qrcode library for barcode scanning -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
adfasdfasd
    
    <!-- Top Fixed Bar -->
    <div class="top-bar">
        <div class="input-container">
            <span class="barcode-icon">📊</span>
            <input 
                type="text" 
                id="manualInput" 
                placeholder="Enter tracking code"
                autocomplete="off"
            >
            <button id="cameraBtn" class="camera-btn" aria-label="Open camera scanner">
                📷
            </button>
        </div>
    </div>
    <!-- Scanner Overlay (Hidden by default) -->
    <div id="scannerOverlay" class="scanner-overlay">
        <div class="scanner-top-panel">
            <div class="scanner-nav">
                <button id="closeScanner" class="nav-back-btn" aria-label="Close scanner">←</button>
                <div class="scanner-title">Scan Your Shipments</div>
                <button id="torchBtn" class="nav-torch-btn" aria-label="Toggle flashlight" title="Flashlight">🔦</button>
            </div>
            <div id="scanSummary" class="scan-summary">
                <div class="scan-summary-label">
                    Scanned Orders <span id="scannedCount">0</span> / <span id="totalCount">0</span>
                </div>
            </div>
        </div>

        <div class="scanner-frame">
            <div class="scanner-banner">
                <span class="scanner-banner-icon">║║║</span>
                <span class="scanner-banner-text">Please Scan Waybill</span>
                <span class="scanner-banner-icon">║║║</span>
            </div>
            <div id="scannerContainer" class="scanner-container"></div>
            <div class="scanner-frame-border"></div>
            <div id="scannedCodeDisplay" class="scanned-code-display"></div>
        </div>

        <div class="scanner-bottom">
            <div class="scanner-bottom-text">
                Use Keyboard / HDD to enter Waybill Number
            </div>
            <div class="scanner-bottom-actions">
                <button class="bottom-btn">Enter Waybill no</button>
                <button class="bottom-btn">HDD Input</button>
            </div>
        </div>
    </div>

    <!-- Display List (Hidden) -->
    <div class="content-area" style="display: none;">
        <table class="tracking-table">
            <thead>
                <tr>
                    <th>Sr No</th>
                    <th>Tracking</th>
                    <th>Entry Type</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="trackingList">
                <!-- Items will be added here dynamically -->
            </tbody>
        </table>
    </div>

    <!-- Success/Error Messages -->
    <div id="message" class="message"></div>

    <script src="script.js"></script>
</body>
</html>
